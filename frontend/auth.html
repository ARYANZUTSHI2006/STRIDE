<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stride | Authenticate</title>
    <style>
        /* ---------- GLOBAL STYLES (Main Site Theme) ---------- */
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --dark: #292f36;
            --light: #f7fff7;
            --accent: #ff9f1c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Styles */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            position: fixed;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        header.scrolled {
            background-color: rgba(255, 255, 255, 0.98);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo i {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--primary);
            bottom: -5px;
            left: 0;
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .hamburger {
            display: none;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7)),
                url('https://images.unsplash.com/photo-1600269452121-4f2416e55c28?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1965&q=80') no-repeat center center/cover;
            padding-top: 80px;
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hero-text {
            flex: 1;
            padding-right: 2rem;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero-text h1 span {
            color: var(--primary);
        }

        .hero-text p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #555;
            max-width: 600px;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid var(--primary);
        }

        .cta-button:hover {
            background-color: transparent;
            color: var(--primary);
        }

        .hero-image {
            flex: 1;
            position: relative;
            height: 500px;
        }

        .shoe-display {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1025&q=80') no-repeat center center/contain;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* Featured Section */
        .featured {
            padding: 5rem 0;
            background-color: white;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-title h2 {
            font-size: 2.5rem;
            color: var(--dark);
            position: relative;
            display: inline-block;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 3px;
            background: var(--primary);
            bottom: -10px;
            left: 25%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 1;
        }

        .product-image {
            height: 250px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            max-width: 80%;
            max-height: 80%;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .product-info p {
            color: #777;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .product-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--dark);
        }

        .add-to-cart {
            background: var(--dark);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .add-to-cart:hover {
            background: var(--primary);
        }

        /* Categories Section */
        .categories {
            padding: 5rem 0;
            background-color: #f9f9f9;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .category-card {
            position: relative;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .category-card:hover {
            transform: scale(1.03);
        }

        .category-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .category-card:hover .category-image {
            transform: scale(1.1);
        }

        .category-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 1.5rem;
            color: white;
        }

        .category-overlay h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .category-overlay a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
        }

        .category-overlay a i {
            margin-left: 0.5rem;
            transition: transform 0.3s;
        }

        .category-overlay a:hover i {
            transform: translateX(5px);
        }

        /* Testimonials Section */
        .testimonials {
            padding: 5rem 0;
            background-color: white;
        }

        .testimonials-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .testimonial-slider {
            position: relative;
            overflow: hidden;
        }

        .testimonial-slide {
            padding: 2rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .testimonial-slide.active {
            display: block;
        }

        .testimonial-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1.5rem;
            border: 5px solid var(--primary);
        }

        .testimonial-text {
            font-size: 1.1rem;
            font-style: italic;
            color: #555;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .testimonial-author {
            font-weight: 700;
            color: var(--dark);
        }

        .testimonial-role {
            color: #777;
            font-size: 0.9rem;
        }

        .slider-controls {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .slider-dot {
            width: 12px;
            height: 12px;
            background: #ddd;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .slider-dot.active {
            background: var(--primary);
        }

        /* Newsletter Section */
        .newsletter {
            padding: 5rem 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-align: center;
        }

        .newsletter h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .newsletter p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .newsletter-form {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
        }

        .newsletter-input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 50px 0 0 50px;
            font-size: 1rem;
            outline: none;
        }

        .newsletter-button {
            padding: 1rem 2rem;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 0 50px 50px 0;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .newsletter-button:hover {
            background: #1a1f24;
        }

        /* Footer */
        footer {
            background-color: var(--dark);
            color: white;
            padding: 4rem 0 2rem;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .footer-column h3 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 0.5rem;
        }

        .footer-column h3::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 2px;
            background: var(--primary);
            bottom: 0;
            left: 0;
        }

        .footer-column ul {
            list-style: none;
        }

        .footer-column ul li {
            margin-bottom: 0.8rem;
        }

        .footer-column ul li a {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-column ul li a:hover {
            color: var(--primary);
        }

        .social-links {
            display: flex;
            gap: 1rem;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: white;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 999;
        }

        .back-to-top.active {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            background: var(--dark);
            transform: translateY(-5px);
        }

        /* Responsive Styles */
        @media (max-width: 992px) {
            .hero-content {
                flex-direction: column;
                text-align: center;
            }

            .hero-text {
                padding-right: 0;
                margin-bottom: 3rem;
            }

            .hero-image {
                width: 80%;
            }

            .hero-text h1 {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 80px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 80px);
                background: white;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition: left 0.3s;
            }

            .nav-links.active {
                left: 0;
            }

            .nav-links li {
                margin: 1.5rem 0;
            }

            .hero-text h1 {
                font-size: 2.5rem;
            }

            .section-title h2 {
                font-size: 2rem;
            }

            .newsletter-form {
                flex-direction: column;
            }

            .newsletter-input {
                border-radius: 50px;
                margin-bottom: 1rem;
            }

            .newsletter-button {
                border-radius: 50px;
            }
        }

        @media (max-width: 576px) {
            .hero-text h1 {
                font-size: 2rem;
            }

            .hero-text p {
                font-size: 1rem;
            }

            .cta-button {
                padding: 0.7rem 1.5rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 5px;
            font-weight: 600;
            display: none;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            transition: all 0.3s ease;
        }

        .form-message.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
        }

        .form-message.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
        }

        /* ---------- AUTH PAGE CUSTOM STYLES (card, inputs, elevated design) ---------- */
        .auth-body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(125deg, var(--light) 0%, #fff5f0 100%);
            padding: 1.5rem;
        }

        .auth-container {
            background: white;
            max-width: 480px;
            width: 100%;
            padding: 2.5rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            transition: transform 0.25s ease, box-shadow 0.3s;
            text-align: center;
            border: 1px solid rgba(255, 107, 107, 0.15);
        }

        .auth-container:hover {
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.25);
        }

        #auth-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.8rem;
            background: linear-gradient(130deg, var(--dark) 0%, var(--primary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        #authForm {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        #authForm input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1.5px solid #e9ecef;
            border-radius: 60px;
            font-size: 1rem;
            background: #fefefe;
            transition: all 0.25s;
            outline: none;
            color: var(--dark);
        }

        #authForm input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.2);
            background: white;
        }

        #authBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 12px rgba(255, 107, 107, 0.3);
        }

        #authBtn:hover {
            background: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        #authBtn:active {
            transform: translateY(1px);
        }

        #toggle-text {
            margin-top: 1.8rem;
            font-size: 0.9rem;
            color: #5f6c7a;
            cursor: pointer;
            transition: color 0.2s;
            display: inline-block;
            font-weight: 500;
        }

        #toggle-text:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* additional spacing for form message */
        .form-message {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            border-radius: 50px;
            text-align: center;
        }

        /* subtle brand accent */
        .auth-container::before {
            content: "👟";
            font-size: 2.8rem;
            display: block;
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        @media (max-width: 500px) {
            .auth-container {
                padding: 1.8rem 1.3rem;
            }
            #auth-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <h2 id="auth-title">Login</h2>
        <form id="authForm">
            <input type="email" id="email" placeholder="Email address" required autocomplete="email">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit" id="authBtn">Login</button>
        </form>
        <div id="formMessage" class="form-message"></div>
        <p id="toggle-text">Don't have an account? Sign Up</p>
    </div>

    <script>
        // Authentication state toggling (Login / Sign Up)
        let isLogin = true;

        // DOM elements
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('authBtn');
        const toggleText = document.getElementById('toggle-text');
        const formMessage = document.getElementById('formMessage');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authForm = document.getElementById('authForm');

        // Helper: display inline message (success/error) instead of alert
        function displayMessage(message, type) {
            formMessage.innerHTML = message;
            formMessage.className = `form-message ${type}`;
            // Auto-hide success messages after 3 seconds (but keep errors longer)
            if (type === 'success') {
                setTimeout(() => {
                    if (formMessage.className.includes('success')) {
                        formMessage.className = 'form-message';
                        formMessage.innerHTML = '';
                    }
                }, 3200);
            }
        }

        // Clear message when user starts typing or toggling
        function clearMessage() {
            formMessage.className = 'form-message';
            formMessage.innerHTML = '';
        }

        // Toggle between Login & Signup mode
        function toggleAuth() {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "Login" : "Sign Up";
            authBtn.innerText = isLogin ? "Login" : "Sign Up";
            toggleText.innerText = isLogin ? 
                "Don't have an account? Sign Up" : "Already have an account? Login";
            // Clear form fields & any message for better UX
            emailInput.value = '';
            passwordInput.value = '';
            clearMessage();
        }

        // Attach toggle event
        toggleText.addEventListener('click', toggleAuth);

        // Form submission (Login / Signup)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // Basic validation
            if (!email || !password) {
                displayMessage("Please fill in both email and password.", "error");
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                displayMessage("Please enter a valid email address.", "error");
                return;
            }
            if (password.length < 4) {
                displayMessage("Password must be at least 4 characters.", "error");
                return;
            }

            // Determine endpoint
            const endpoint = isLogin ? '/api/login' : '/api/signup';
            
            // Disable button & show loading state
            const originalBtnText = authBtn.innerText;
            authBtn.disabled = true;
            authBtn.innerText = "Processing...";
            clearMessage();

            try {
                const res = await fetch(`http://localhost:4000${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    if (isLogin) {
                        // LOGIN SUCCESS: store user info & redirect to main shop
                        localStorage.setItem('user', JSON.stringify(data));
                        // Small visual feedback before redirect
                        displayMessage("Login successful! Redirecting...", "success");
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                    } else {
                        // SIGNUP SUCCESS: show success message, then switch to login mode
                        displayMessage("✨ Account created successfully! Please log in.", "success");
                        // Reset form and toggle to login after short delay
                        setTimeout(() => {
                            // only toggle if we are still on signup mode (avoid race)
                            if (!isLogin) {
                                toggleAuth();   // switch to Login mode
                                emailInput.value = email;  // keep email pre-filled for convenience
                                passwordInput.value = '';
                                clearMessage();
                            } else {
                                // fallback: just clear message
                                clearMessage();
                            }
                        }, 1800);
                    }
                } else {
                    // Server error message (e.g., user exists, invalid credentials)
                    const errorMsg = data.msg || (isLogin ? "Invalid email or password" : "Signup failed. Email might already exist.");
                    displayMessage(errorMsg, "error");
                }
            } catch (err) {
                console.error("Auth error:", err);
                displayMessage("Network error: Cannot connect to server. Please make sure the backend is running on port 4000.", "error");
            } finally {
                // Re-enable button (if not redirected immediately)
                if (authBtn.disabled) {
                    authBtn.disabled = false;
                    authBtn.innerText = originalBtnText;
                }
            }
        });
    </script>
</body>
</html>
