<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stride | Authenticate</title>
    <link rel="stylesheet" href="authstyle.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h2 id="auth-title">Login</h2>
        <form id="authForm">
            <input type="email" id="email" placeholder="Email address" required autocomplete="email">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit" id="authBtn">Login</button>
        </form>
        <div id="formMessage" class="form-message"></div>
        <p id="toggle-text">Don't have an account? Sign Up</p>
    </div>

    <script src="authscript.js"></script>
</body>
</html>
